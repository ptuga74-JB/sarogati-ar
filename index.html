<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Sarogati - O Banqueiro AR</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: transparent !important;
        }

        /* Feed da câmara em ecrã inteiro no fundo */
        video {
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
            z-index: -2 !important;
            display: block !important;
            opacity: 1 !important;
        }

        /* Camada gráfica do A-Frame transparente */
        .a-canvas {
            width: 100% !important;
            height: 100% !important;
            top: 0;
            left: 0;
            position: absolute;
            background-color: transparent !important;
        }

        /* Desativa overlays de loading nativos */
        .mindar-ui-loading { display: none !important; }
        .mindar-ui-scanning { background: transparent !important; }
    </style>
</head>
<body>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.001; filterBeta: 0.01; uiLoading: no; uiScanning: yes;" 
             embedded 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights: true, antialias: true, alpha: true" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="logo-jogo" src="./Sarogati.glb"></a-asset-item>
        </a-assets>

        <a-light type="ambient" color="#ffffff" intensity="1.4"></a-light>
        <a-light type="directional" color="#ffffff" intensity="0.8" position="1 2 1"></a-light>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity id="contentores-logo" position="0 0 0" rotation="0 0 -90">
                <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 9000; easing: linear"
                          animation__float="property: position; to: 0 0.1 0; dir: alternate; loop: true; dur: 2500; easing: easeInOutQuad">
                    
                    <a-entity gltf-model="#logo-jogo" scale="0.002 0.002 0.002" position="0 0 0"></a-entity>
                    
                </a-entity>
            </a-entity>
        </a-entity>


        <a-entity mindar-image-target="targetIndex: 1">
            
            <a-plane position="0 0 0.05" rotation="-70 0 0" width="1.6" height="1.0" color="#0a192f" material="opacity: 0.88; transparent: true; side: double;">
                
                <a-rect width="1.56" height="0.96" fill="none" stroke="#00b894" stroke-width="1"></a-rect>

                <a-entity position="-0.48 0.25 0.02">
                    <a-text value="ECONOMIA" color="#00a8ff" align="left" width="1.1" font="mozillavr"></a-text>
                    <a-text value="Inflacao: 4%" color="#ffffff" align="left" width="0.85" position="0 -0.15 0"></a-text>
                    <a-text value="Taxas Juro: 2.5%" color="#ffffff" align="left" width="0.85" position="0 -0.28 0"></a-text>
                    
                    <a-entity position="0 -0.42 0">
                        <a-sphere radius="0.025" color="#00b894" animation="property: material.opacity; from: 1; to: 0.2; dir: alternate; loop: true; dur: 800"></a-sphere>
                        <a-text value="Expansao" color="#00b894" align="left" width="0.8" position="0.07 0 0"></a-text>
                    </a-entity>
                </a-entity>

                <a-entity position="0 0.25 0.02">
                    <a-text value="NOTICIAS DO BANQUEIRO" color="#e17055" align="center" width="1.1" font="mozillavr"></a-text>
                    
                    <a-plane color="#0f2342" width="0.52" height="0.45" position="0 -0.26 0.01" material="opacity: 0.9">
                        <a-text id="ticker-financeiro" value="A aceder aos mercados do Banco..." color="#fbc531" align="center" width="0.58" wrap-count="17" position="0 0 0.01"></a-text>
                    </a-plane>
                </a-entity>

                <a-entity position="0.48 0.25 0.02">
                    <a-text value="RESERVAS" color="#00a8ff" align="right" width="1.1" font="mozillavr"></a-text>
                    <a-text value="Liquidez do Banco:" color="#ffffff" align="right" width="0.85" position="0 -0.15 0"></a-text>
                    <a-text value="50.000 EUR" color="#00b894" align="right" width="1.0" font="mozillavr" position="0 -0.28 0"></a-text>
                </a-entity>

            </a-plane>
        </a-entity>

    </scene>

    <script>
        const eventosLiteracia = [
            "Dica: Criar um fundo de emergencia reduz o teu risco no jogo!",
            "Atencao: A inflacao subiu, o teu dinheiro parado rende menos!",
            "Oportunidade: Taxas de juro baixas favorecem o credito habitacao.",
            "Sabias? Diversificar os teus investimentos protege o teu patrimonio.",
            "Regra de Ouro: Paga-te a ti proprio primeiro antes de gastares!"
        ];

        let ponteiro = 0;
        const elementoTexto = document.getElementById('ticker-financeiro');

        function atualizarTicker() {
            if (!elementoTexto) return;
            elementoTexto.setAttribute('value', "A processar dados...");
            setTimeout(() => {
                elementoTexto.setAttribute('value', eventosLiteracia[ponteiro]);
                ponteiro = (ponteiro + 1) % eventosLiteracia.length;
            }, 250);
        }

        setInterval(atualizarTicker, 15000);
        setTimeout(atualizarTicker, 3000);
    </script>
</body>
</html>
